<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube TLDW Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            padding: 50px; 
            text-align: center; 
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
        }
        h2 { margin-top: 0; color: #333; }
        input { 
            width: 80%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px;
        }
        button { 
            padding: 12px 24px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        button:hover { background-color: #0056b3; }
        
        /* --- THE NEW SUMMARY BOX --- */
        #result { 
            display: none; /* Hidden until there is a result */
            margin-top: 30px; 
            padding: 20px;
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-align: left; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            color: #333;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* --- THE NEW LOADING SPINNER --- */
        .loader-container {
            display: none; /* Hidden by default */
            margin-top: 30px;
        }
        .spinner {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #007bff; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #555;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📺 YouTube TLDW Dashboard</h2>
    <p style="color: #666; margin-bottom: 25px;">Paste a YouTube link below to instantly summarize the video.</p>
    
    <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
    <br>
    <button onclick="getSummary()">Summarize Video</button>
    
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Reading transcript and summarizing... ⏳</div>
    </div>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
